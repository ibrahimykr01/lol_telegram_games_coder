<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LOL Şampiyon Tahmin Etmece!</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            color: #f0f3fa;
        }
        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 28, 44, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.2s ease;
        }
        .question-area {
            background: #0f1422;
            border-radius: 32px;
            padding: 20px 16px;
            margin-bottom: 24px;
            text-align: center;
            border-bottom: 3px solid #ffd966;
        }
        .champ-img {
            font-size: 80px;
            margin: 10px 0;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5));
        }
        .champ-name-placeholder {
            background: #1a1f2e;
            border-radius: 60px;
            padding: 12px;
            font-size: 1.7rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ffd966;
            text-transform: uppercase;
            font-family: monospace;
        }
        .score-area {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            background: #00000055;
            padding: 8px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .option-btn {
            background: #1e2a3e;
            border: none;
            padding: 16px 8px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #eef2ff;
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 #0f1119;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
        }
        .option-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0f1119;
        }
        .correct {
            background: #2b8c4a;
            box-shadow: 0 0 12px #2b8c4a;
        }
        .wrong {
            background: #b13e3e;
            animation: shake 0.3s ease-in-out 0s 2;
        }
        @keyframes shake {
            0%,100%{ transform: translateX(0); }
            25%{ transform: translateX(-6px); }
            75%{ transform: translateX(6px); }
        }
        .next-btn {
            background: #ffd966;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            color: #1a1f2e;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.1s linear;
        }
        .next-btn:active {
            transform: scale(0.97);
        }
        .feedback {
            text-align: center;
            font-size: 1rem;
            margin-top: 10px;
            min-height: 48px;
            font-weight: 500;
        }
        footer {
            text-align: center;
            font-size: 11px;
            margin-top: 15px;
            opacity: 0.6;
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
        }
    </style>
</head>
<body>

<div class="game-container" id="gameContainer">
    <div class="question-area">
        <div class="champ-img">🏆 <span id="champIcon">🎭</span> 🏆</div>
        <div class="champ-name-placeholder" id="champPlaceholder">???</div>
    </div>

    <div class="score-area">
        <span>📊 Skor: <span id="scoreValue">0</span></span>
        <span>⚡ Doğru: <span id="correctCount">0</span></span>
    </div>

    <div id="optionsContainer" class="options-grid">
        <!-- şıklar buraya dinamik eklenecek -->
    </div>

    <button id="nextBtn" class="next-btn" disabled>▶ Sonraki Şampiyon</button>
    <div id="feedback" class="feedback"></div>
    <footer>⚡ League of Legends Fan Mini Game ⚡</footer>
</div>

<script>
    // --- Şampiyon Havuzu ---
    const CHAMPIONS = [
        "Ahri", "Yasuo", "Zed", "Thresh", "Jinx", "Lee Sin",
        "Darius", "Lux", "Master Yi", "Morgana", "K'Sante", "Bel'Veth"
    ];

    let currentQuestion = null;      // { correct : "Ahri", options : ["Ahri","Yasuo","Zed"] }
    let score = 0;
    let correctAnswers = 0;
    let lockSelection = false;
    let currentQuestionCount = 0;

    // DOM elemanları
    const champPlaceholder = document.getElementById("champPlaceholder");
    const scoreSpan = document.getElementById("scoreValue");
    const correctSpan = document.getElementById("correctCount");
    const optionsDiv = document.getElementById("optionsContainer");
    const nextBtn = document.getElementById("nextBtn");
    const feedbackDiv = document.getElementById("feedback");

    // Karıştırma fonksiyonu (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Rastgele şampiyon seç (mevcut doğru cevaptan farklı olsun)
    function getRandomDistinct(currentCorrect) {
        let candidates = CHAMPIONS.filter(c => c !== currentCorrect);
        if (candidates.length === 0) candidates = CHAMPIONS.filter(c => c !== currentCorrect);
        const randomIndex = Math.floor(Math.random() * candidates.length);
        return candidates[randomIndex];
    }

    // Yeni soru oluştur
    function generateNewQuestion() {
        const correctChamp = CHAMPIONS[Math.floor(Math.random() * CHAMPIONS.length)];
        let optionsSet = new Set();
        optionsSet.add(correctChamp);
        while (optionsSet.size < 3) {
            const randomChamp = CHAMPIONS[Math.floor(Math.random() * CHAMPIONS.length)];
            if (randomChamp !== correctChamp) optionsSet.add(randomChamp);
        }
        let options = Array.from(optionsSet);
        options = shuffleArray(options);
        return { correct: correctChamp, options: options };
    }

    // Arayüzü güncelle
    function renderQuestion() {
        if (!currentQuestion) return;
        champPlaceholder.innerText = "?????";
        // opsiyon butonlarını oluştur
        optionsDiv.innerHTML = "";
        currentQuestion.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.className = "option-btn";
            btn.addEventListener("click", () => handleAnswer(opt, btn));
            optionsDiv.appendChild(btn);
        });
        lockSelection = false;
        nextBtn.disabled = true;
        nextBtn.innerText = "▶ Sonraki Şampiyon";
        feedbackDiv.innerHTML = "✨ Hangi şampiyonun adı bu sır perdesi arkasında? ✨";
        champPlaceholder.style.background = "#1a1f2e";
        // şampiyon ikonu biraz eğlence
        const champIcon = document.getElementById("champIcon");
        if(!document.getElementById("champIcon")) {
            const newSpan = document.createElement("span");
            newSpan.id="champIcon";
            newSpan.innerText = "🎭";
            document.querySelector(".champ-img").appendChild(newSpan);
        }
        const emotes = ["🤔","❓","🏆","🔥","🎭","🌀"];
        champIcon.innerText = emotes[Math.floor(Math.random()*emotes.length)];
    }

    // Cevap işleme
    function handleAnswer(selectedOption, btnElement) {
        if (lockSelection) return;
        const isCorrect = (selectedOption === currentQuestion.correct);
        lockSelection = true;

        if (isCorrect) {
            score += 10;
            correctAnswers++;
            feedbackDiv.innerHTML = `✅ DOĞRU! +10 puan ✅<br>Doğru cevap: ${currentQuestion.correct}`;
            btnElement.classList.add("correct");
            // diğer butonları devre dışı bırak (görsel)
            const allBtns = document.querySelectorAll(".option-btn");
            allBtns.forEach(btn => { btn.disabled = true; });
            // Doğru cevap butonuna vurgu yap
            document.querySelectorAll(".option-btn").forEach(btn => {
                if(btn.innerText === currentQuestion.correct) btn.classList.add("correct");
            });
        } else {
            feedbackDiv.innerHTML = `❌ YANLIŞ! ❌<br>Doğru cevap <strong>${currentQuestion.correct}</strong> olacaktı.`;
            btnElement.classList.add("wrong");
            const allBtns = document.querySelectorAll(".option-btn");
            allBtns.forEach(btn => { btn.disabled = true; });
            // doğru cevabı vurgula
            document.querySelectorAll(".option-btn").forEach(btn => {
                if(btn.innerText === currentQuestion.correct) btn.classList.add("correct");
            });
        }
        scoreSpan.innerText = score;
        correctSpan.innerText = correctAnswers;
        nextBtn.disabled = false;
        champPlaceholder.innerText = currentQuestion.correct;
        champPlaceholder.style.background = "#ffd966";
        champPlaceholder.style.color = "#1a1f2e";
    }

    // Sonraki soruya geç
    function loadNextQuestion() {
        if (!lockSelection && currentQuestion !== null) {
            // hiç cevap vermeden sonraki butona basarsa uyar
            feedbackDiv.innerHTML = "⚠️ Lütfen önce şampiyonu tahmin et!";
            return;
        }
        currentQuestion = generateNewQuestion();
        renderQuestion();
        currentQuestionCount++;
        // kullanıcıya keyif vermek için 
        if(currentQuestionCount % 5 === 0) {
            feedbackDiv.innerHTML = "🎉 Mükemmel seri! 🎉";
        }
    }

    // Telegram Web App bağlantısı (isteğe bağlı yüksek skor paylaşımı)
    function initTelegramGame() {
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            // tema rengini uyarla
            const bgColor = Telegram.WebApp.themeParams.bg_color || "#0c1222";
            document.body.style.backgroundColor = bgColor;
        } else {
            console.log("Telegram Web App çalışmıyor, normal tarayıcıda test.");
        }
    }

    // Oyun başlangıcı
    function startGame() {
        score = 0;
        correctAnswers = 0;
        currentQuestionCount = 0;
        scoreSpan.innerText = "0";
        correctSpan.innerText = "0";
        currentQuestion = generateNewQuestion();
        renderQuestion();
        lockSelection = false;
        nextBtn.disabled = true;
        feedbackDiv.innerHTML = "✨ Hadi bakalım, şampiyonu bil! ✨";
        initTelegramGame();
    }

    // event listener next buton
    nextBtn.addEventListener("click", loadNextQuestion);

    // Oyunu başlat
    startGame();
</script>
</body>
</html>
